<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INS+ — Date statistice România</title>
    <meta name="description" content="Explorați peste 3.600 de seturi de date statistice oficiale din România. Cifre pentru forța de muncă, economie, demografie, turism și multe altele — date de la INS Tempo Online, prezentate mai accesibil.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ins.gov2.ro/">
    <meta property="og:title" content="INS+ — Date statistice oficiale România">
    <meta property="og:description" content="Explorați peste 3.600 de seturi de date statistice oficiale din România — cifre pentru forța de muncă, economie, demografie, turism și multe altele.">
    <meta property="og:image" content="https://ins.gov2.ro/img/landing.png">
    <meta property="og:image:width" content="1400">
    <meta property="og:image:height" content="900">
    <meta property="og:locale" content="ro_RO">
    <meta property="og:locale:alternate" content="en_GB">
    <meta property="og:site_name" content="INS+">

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="INS+ — Date statistice oficiale România">
    <meta name="twitter:description" content="Explorați peste 3.600 de seturi de date statistice oficiale din România.">
    <meta name="twitter:image" content="https://ins.gov2.ro/img/landing.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/explore.css?v=30">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <!-- Notice bar (above everything) -->
    <div class="notice-bar hidden" id="notice-bar">
        <span class="notice-icon">&#x26A0;</span>
        <span class="notice-text" id="notice-text"></span>
        <button class="notice-close" id="notice-close">&times;</button>
    </div>

    <!-- Top bar -->
    <nav class="topbar" id="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Quick navigate">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <a id="zelogo" href="/" class="logo"><span class="logo-dot"></span>INS<span style="margin: -1ex 0 0 -1ex;">+</span></a>
            <button class="back-btn hidden" id="back-btn">&larr; Explore</button>
        </div>
        <button class="search-trigger" id="search-trigger">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Search datasets...</span>
            <kbd>&hairsp;/&hairsp;</kbd>
        </button>
        <div class="topbar-right">
            <button class="toggle-btn" id="theme-toggle" title="Toggle light/dark theme">
                <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="toggle-btn lang-toggle" id="lang-toggle" title="Switch language">
                <img id="lang-flag" class="lang-flag" src="" alt="">
                <span id="lang-label">EN</span>
            </button>
        </div>
    </nav>

    <!-- Search overlay -->
    <div class="search-overlay hidden" id="search-overlay">
        <div class="search-backdrop" id="search-backdrop"></div>
        <div class="search-modal">
            <div class="search-input-row">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search datasets, indicators, codes..." spellcheck="false">
                <kbd>esc</kbd>
            </div>
            <div id="search-results" class="search-results"></div>
            <div class="search-footer">
                <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
                <span><kbd>&crarr;</kbd> open</span>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="lens-sidebar hidden" id="lens-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title" id="sidebar-title">Navigate</span>
            <button class="sidebar-close" id="sidebar-close">&times;</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="sidebar-search-input" placeholder="Filter datasets..." spellcheck="false" autocomplete="off">
        </div>
        <div id="sidebar-tree" class="sidebar-tree"></div>
    </aside>

    <!-- Main content -->
    <main id="app">
        <!-- Browse view -->
        <section id="browse-view" class="browse-view">
            <div class="browse-header">
                <h1 class="browse-title" id="browse-title"></h1>
                <p class="browse-subtitle" id="browse-subtitle"></p>
                <p class="browse-tagline" id="browse-tagline"></p>
            </div>
            <!-- Headline indicators grid (themed KPI cards) -->
            <div class="headlines-section" id="headlines-section"></div>
            <!-- Recently updated datasets -->
            <div class="recent-section hidden" id="recent-section">
                <h3 class="section-label" id="recent-label"></h3>
                <div id="recent-grid"></div>
            </div>
            <!-- Section label before category grid -->
            <h3 class="section-label" id="categories-label"></h3>
            <div class="category-grid" id="category-grid"></div>
            <div class="dataset-panel hidden" id="dataset-panel">
                <div class="panel-header">
                    <button class="panel-back" id="panel-back">&larr; Categories</button>
                    <h2 id="panel-title"></h2>
                    <span class="badge" id="panel-count"></span>
                    <button class="view-toggle" id="view-toggle" title="Toggle list/grid view">
                        <svg class="view-icon-grid" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        <svg class="view-icon-list hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                </div>
                <div class="theme-stats hidden" id="theme-stats"></div>
                <div class="theme-headlines hidden" id="theme-headlines"></div>
                <div id="dataset-list" class="dataset-list"></div>
            </div>
        </section>

        <!-- Dashboard view -->
        <section id="dashboard-view" class="dashboard-view hidden">
            <header class="dash-header" id="dash-header"></header>
            <div class="info-panel hidden" id="info-panel"></div>
            <div class="insights-row" id="insights-row"></div>
            <div class="chart-panel" id="time-panel">
                <div class="panel-bar">
                    <span class="panel-label" id="time-panel-label">Trends</span>
                    <div class="panel-pills" id="time-pills"></div>
                </div>
                <div class="chart-container"><div id="time-chart" style="width:100%;height:100%"></div></div>
            </div>
            <div class="chart-panel" id="snapshot-panel">
                <div class="panel-bar">
                    <span class="panel-label" id="snapshot-panel-label">Snapshot</span>
                    <div class="panel-pills" id="snapshot-pills"></div>
                    <div class="period-nav" id="period-nav"></div>
                </div>
                <div class="chart-container"><div id="snapshot-chart" style="width:100%;height:100%"></div></div>
            </div>
            <div class="filter-strip" id="filter-strip"></div>
            <div class="table-toggle-row" id="table-toggle-row">
                <button class="table-toggle-btn" id="table-toggle-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
                    <span id="table-toggle-label">Show data table</span>
                </button>
            </div>
            <div class="table-panel hidden" id="table-panel">
                <div class="panel-bar">
                    <span class="panel-label" id="table-panel-label">Data</span>
                    <span class="table-row-count" id="table-row-count"></span>
                    <button class="table-close-btn" id="table-close-btn">✕ Hide table</button>
                </div>
                <div class="table-scroll" id="table-scroll"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="site-footer">
        <div class="footer-inner">
            <span class="footer-notice" id="footer-notice"></span>
            <div class="footer-links">
                <!-- <a href="https://gov2.ro/" target="_blank" rel="noopener" class="footer-link">gov2.ro</a> -->
                <a href="https://github.com/gov2-ro/tempo-ins-dump/" target="_blank" rel="noopener" class="footer-link footer-link-github">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
                    tempo-ins-dump
                </a>
            </div>
        </div>
    </footer>

    <!-- Scripts: reuse existing API + chart modules -->
    <script src="/js/utils.js?v=22"></script>
    <script src="/js/api.js?v=26"></script>
    <script src="/js/chart-factory.js?v=30"></script>
    <script src="/js/chart-new-types.js?v=28"></script>
    <script src="/js/chart-geo.js?v=21"></script>
    <script src="/js/chart-demographic.js?v=25"></script>
    <script src="/js/explore-app.js?v=39"></script>

content: "α WIP"; font-weight: normal; font-size: 11px; color: #FFF; background-color: #C99; line-height: 1; padding: 1px 3px;

</html>
