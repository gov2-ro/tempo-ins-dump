<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset — INS TEMPO Explorer</title>
    <link rel="stylesheet" href="/css/main.css?v=20">
    <link rel="stylesheet" href="/css/dataset.css?v=21">
    <link rel="stylesheet" href="/css/dataset-v2.css?v=22">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <header class="app-header">
        <a href="/" class="logo">INS TEMPO Explorer</a>
        <nav>
            <a href="/">Home</a>
            <a href="/datasets.html">Datasets</a>
        </nav>
    </header>

    <div class="dataset-layout">
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle navigation">&#9776;</button>

        <aside class="dataset-sidebar hidden" id="dataset-sidebar">
            <div class="sidebar-header">
                <h3>Navigate</h3>
                <button class="sidebar-close" id="sidebar-close">&times;</button>
            </div>
            <div id="sidebar-tree" class="category-tree"></div>
        </aside>

        <div class="dataset-main">
            <div class="breadcrumb" id="breadcrumb">
                <a href="/">Home</a>
            </div>

            <div class="dataset-page">
                <div id="dataset-header" class="dataset-header">
                    <h1>Loading...</h1>
                    <div class="meta-badges"></div>
                    <div class="warning-badges" id="warning-badges"></div>
                </div>

                <div id="page-controls" class="page-controls"></div>

                <div id="sub-dataset-bar" class="sub-dataset-bar" style="display:none"></div>

                <div class="tab-bar" id="tab-bar">
                    <button class="tab active" data-view="timeline">Timeline</button>
                    <button class="tab" data-view="snapshot">Snapshot</button>
                    <button class="tab" data-view="table">Table</button>
                    <button class="tab" data-view="custom">Custom</button>
                </div>

                <div id="view-controls" class="view-controls-container"></div>

                <div id="chart-selector" class="chart-selector"></div>

                <div class="v2-content" id="v2-content">
                    <div id="loading-overlay" class="loading-overlay" style="display:none">
                        <div class="spinner"></div>
                    </div>

                    <!-- Chart view (timeline / snapshot) -->
                    <div class="v2-chart-area" id="chart-view">
                        <div class="v2-chart-container">
                            <div id="main-chart" style="width:100%;height:100%"></div>
                        </div>
                    </div>

                    <!-- Table view -->
                    <div class="v2-table-layout" id="table-view" style="display:none">
                        <div class="v2-table-area">
                            <div id="data-table" class="data-table-container"></div>
                            <div id="table-footer" class="table-footer"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="dataset-footer" class="dataset-footer"></div>
        </div>
    </div>

    <script src="/js/utils.js?v=22"></script>
    <script src="/js/api.js?v=21"></script>
    <script src="/js/filter-panel.js?v=22"></script>
    <script src="/js/chart-geo.js?v=20"></script>
    <script src="/js/chart-demographic.js?v=24"></script>
    <script src="/js/chart-new-types.js?v=26"></script>
    <script src="/js/chart-factory.js?v=26"></script>
    <script src="/js/data-table.js?v=20"></script>
    <script src="/js/period-browser.js?v=22"></script>
    <script src="/js/view-controls.js?v=22"></script>
    <script src="/js/dataset-page-v2.js?v=30"></script>
</body>
</html>
