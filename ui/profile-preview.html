<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Profile Preview — INS TEMPO</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242736;
  --border: #2e3144;
  --text: #e1e4ed;
  --text-muted: #8b8fa3;
  --accent: #6c8cff;
  --green: #4ade80;
  --orange: #fb923c;
  --purple: #c084fc;
  --red: #f87171;
  --cyan: #22d3ee;
  --yellow: #facc15;
  --pink: #f472b6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* Search bar */
.search-bar { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 12px 0; border-bottom: 1px solid var(--border); }
.search-row { display: flex; gap: 8px; align-items: center; }
.search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; max-height: 300px; overflow-y: auto; display: none; z-index: 20; }
.search-results.open { display: block; }
.search-result { padding: 6px 12px; cursor: pointer; display: flex; gap: 8px; align-items: baseline; }
.search-result:hover, .search-result.active { background: var(--surface2); }
.search-result .code { color: var(--accent); font-weight: 600; min-width: 80px; }
.search-result .name { color: var(--text-muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.counter { color: var(--text-muted); font-size: 11px; white-space: nowrap; }

/* Header */
.profile-header { margin-top: 16px; padding: 16px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
.profile-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.profile-subtitle { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
.badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-archetype { background: #1e3a5f; color: var(--accent); }
.badge-dim { background: #2a2040; color: var(--purple); }
.badge-fill { background: #1a3020; color: var(--green); }
.badge-trend { background: #3a2a10; color: var(--orange); }

/* Warnings */
.warnings { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.warning-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; }
.warning-badge.warning { background: #3a2020; color: var(--red); }
.warning-badge.info { background: #2a2a10; color: var(--yellow); }

/* Page controls */
.page-controls { margin-top: 12px; padding: 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
.page-controls-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }

/* Dimensions */
.dims-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.dim-card { padding: 10px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
.dim-card.singleton { opacity: 0.4; }
.dim-type { font-size: 10px; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
.dim-type.time { color: var(--cyan); }
.dim-type.geo { color: var(--green); }
.dim-type.category { color: var(--orange); }
.dim-type.unit { color: var(--text-muted); }
.dim-type.special { color: var(--pink); }
.dim-label { font-size: 12px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dim-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; }
.dim-meta .tag { background: var(--surface2); padding: 1px 5px; border-radius: 3px; }
.dim-meta .tag.caen { color: var(--orange); }
.dim-meta .tag.hierarchy { color: var(--purple); }

/* Tabs */
.tabs { margin-top: 16px; display: flex; gap: 2px; }
.tab { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; color: var(--text-muted); font-size: 12px; }
.tab.active { background: var(--surface2); color: var(--text); border-color: var(--accent); border-bottom: 2px solid var(--surface2); }
.tab.disabled { opacity: 0.3; cursor: default; }
.tab-content { background: var(--surface2); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; padding: 16px; min-height: 200px; }

/* Charts */
.chart-card { padding: 12px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); margin-bottom: 8px; }
.chart-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.chart-type-badge { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.chart-type-badge.line { background: #1e2a4f; color: #60a5fa; }
.chart-type-badge.area_stacked { background: #1e2a4f; color: #60a5fa; }
.chart-type-badge.choropleth { background: #1a3020; color: var(--green); }
.chart-type-badge.horizontal_bar, .chart-type-badge.bar_vertical, .chart-type-badge.grouped_bar, .chart-type-badge.stacked_bar { background: #3a2a10; color: var(--orange); }
.chart-type-badge.population_pyramid { background: #2a1040; color: var(--purple); }
.chart-type-badge.bubble { background: #0a2a2a; color: var(--cyan); }
.chart-type-badge.heatmap { background: #3a1020; color: var(--pink); }
.primary-tag { font-size: 10px; color: var(--green); background: #1a3020; padding: 1px 6px; border-radius: 3px; }
.toggle-tag { font-size: 10px; color: var(--text-muted); background: var(--surface2); padding: 1px 6px; border-radius: 3px; }

.roles-table { width: 100%; font-size: 11px; }
.roles-table td { padding: 2px 8px; vertical-align: top; }
.roles-table .role-name { color: var(--text-muted); white-space: nowrap; width: 60px; }
.roles-table .role-value { color: var(--text); word-break: break-all; }

/* Controls */
.controls-section { margin-top: 12px; }
.controls-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.control-item { display: flex; gap: 8px; align-items: baseline; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.control-item:last-child { border-bottom: none; }
.control-type { color: var(--cyan); min-width: 120px; }
.control-col { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.control-scope { color: var(--text-muted); font-size: 10px; }
.control-default { color: var(--text-muted); font-size: 10px; }

/* Period browser preview */
.period-browser { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface); border-radius: 6px; margin-bottom: 12px; }
.period-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
.period-current { color: var(--text); font-weight: 600; font-size: 14px; }
.period-granularity { color: var(--text-muted); font-size: 10px; }

/* Table view */
.table-placeholder { color: var(--text-muted); font-style: italic; padding: 40px; text-align: center; }

/* Meta */
.meta-row { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
.meta-item { display: flex; gap: 4px; }
.meta-label { color: var(--text-muted); }
.meta-value { color: var(--text); }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="container">
  <div class="search-bar">
    <div class="search-row" style="position:relative">
      <button class="nav-btn" id="prevBtn" title="Previous dataset">&#9664;</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search datasets (code or name)..." autocomplete="off">
      <button class="nav-btn" id="nextBtn" title="Next dataset">&#9654;</button>
      <button class="nav-btn" id="randomBtn" title="Random dataset">&#9733;</button>
      <span class="counter" id="counter"></span>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <div id="profileContent">
    <div class="loading">Loading index...</div>
  </div>
</div>

<script>
const BASE = '../data/view-profiles';
let index = [];
let currentIdx = -1;
let currentProfile = null;

// --- Init ---
async function init() {
  try {
    const resp = await fetch(`${BASE}/_index.json`);
    index = await resp.json();
    document.getElementById('counter').textContent = `${index.length} datasets`;
    document.getElementById('profileContent').innerHTML = '<div class="loading">Search for a dataset or press &#9733; for random</div>';
    // Load from hash
    const hash = location.hash.slice(1);
    if (hash) {
      const i = index.findIndex(d => d.code === hash);
      if (i >= 0) { currentIdx = i; loadProfile(index[i].code); }
    }
  } catch (e) {
    document.getElementById('profileContent').innerHTML = `<div class="loading">Error loading index: ${e.message}</div>`;
  }
}

// --- Search ---
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let selectedResultIdx = -1;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 1) { searchResults.classList.remove('open'); return; }
  const matches = index.filter(d =>
    d.code.toLowerCase().includes(q) || d.name.toLowerCase().includes(q)
  ).slice(0, 20);
  if (matches.length === 0) { searchResults.classList.remove('open'); return; }
  selectedResultIdx = -1;
  searchResults.innerHTML = matches.map((d, i) =>
    `<div class="search-result" data-idx="${index.indexOf(d)}">
      <span class="code">${d.code}</span>
      <span class="name">${d.name}</span>
    </div>`
  ).join('');
  searchResults.classList.add('open');
  searchResults.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      currentIdx = parseInt(el.dataset.idx);
      loadProfile(index[currentIdx].code);
      searchResults.classList.remove('open');
      searchInput.value = index[currentIdx].code;
    });
  });
});

searchInput.addEventListener('keydown', (e) => {
  const items = searchResults.querySelectorAll('.search-result');
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedResultIdx = Math.min(selectedResultIdx + 1, items.length - 1); updateResultHighlight(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectedResultIdx = Math.max(selectedResultIdx - 1, 0); updateResultHighlight(items); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedResultIdx >= 0 && items[selectedResultIdx]) {
      items[selectedResultIdx].click();
    } else if (searchInput.value.trim()) {
      // Try exact code match
      const q = searchInput.value.trim().toUpperCase();
      const i = index.findIndex(d => d.code === q);
      if (i >= 0) { currentIdx = i; loadProfile(index[i].code); searchResults.classList.remove('open'); }
    }
  }
  else if (e.key === 'Escape') { searchResults.classList.remove('open'); }
});

function updateResultHighlight(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === selectedResultIdx));
  if (items[selectedResultIdx]) items[selectedResultIdx].scrollIntoView({ block: 'nearest' });
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-bar')) searchResults.classList.remove('open');
});

// --- Navigation ---
document.getElementById('prevBtn').addEventListener('click', () => {
  if (index.length === 0) return;
  currentIdx = currentIdx <= 0 ? index.length - 1 : currentIdx - 1;
  loadProfile(index[currentIdx].code);
  searchInput.value = index[currentIdx].code;
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (index.length === 0) return;
  currentIdx = currentIdx >= index.length - 1 ? 0 : currentIdx + 1;
  loadProfile(index[currentIdx].code);
  searchInput.value = index[currentIdx].code;
});
document.getElementById('randomBtn').addEventListener('click', () => {
  if (index.length === 0) return;
  currentIdx = Math.floor(Math.random() * index.length);
  loadProfile(index[currentIdx].code);
  searchInput.value = index[currentIdx].code;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (document.activeElement === searchInput) return;
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'r') document.getElementById('randomBtn').click();
});

// --- Load profile ---
async function loadProfile(code) {
  location.hash = code;
  document.getElementById('counter').textContent = `${currentIdx + 1} / ${index.length}`;
  try {
    const resp = await fetch(`${BASE}/${code}.json`);
    currentProfile = await resp.json();
    renderProfile(currentProfile);
  } catch (e) {
    document.getElementById('profileContent').innerHTML = `<div class="loading">Error loading ${code}: ${e.message}</div>`;
  }
}

// --- Render ---
function renderProfile(p) {
  const dims = p.dimensions;
  const views = p.views;
  const meta = p.meta || {};

  let html = '';

  // Header
  html += `<div class="profile-header">
    <div class="profile-title">${p.matrix_code}</div>
    <div class="profile-subtitle">${p.matrix_name || ''}</div>
    <div class="badge-row">
      <span class="badge badge-archetype">${p.archetype}</span>
      <span class="badge badge-dim">${p.dim_count} dims</span>
      ${meta.fill_rate != null ? `<span class="badge badge-fill">${(meta.fill_rate * 100).toFixed(0)}% fill</span>` : ''}
      ${meta.trend_direction ? `<span class="badge badge-trend">${meta.trend_direction}</span>` : ''}
      ${meta.row_count ? `<span class="badge" style="background:#1a1a2e;color:var(--text-muted)">${meta.row_count.toLocaleString()} rows</span>` : ''}
    </div>`;

  // Warnings
  if (p.warnings && p.warnings.length > 0) {
    html += '<div class="warnings">';
    for (const w of p.warnings) {
      html += `<span class="warning-badge ${w.severity}">${w.type}: ${w.message}</span>`;
    }
    html += '</div>';
  }
  html += '</div>';

  // Page controls
  if (p.page_controls && p.page_controls.length > 0) {
    html += '<div class="page-controls"><div class="page-controls-title">Page-level controls (mandatory)</div>';
    for (const c of p.page_controls) {
      html += `<div class="control-item">
        <span class="control-type">${c.type}</span>
        <span class="control-col">${c.label || c.column}</span>
        <span class="control-scope">${c.scope}</span>
        ${c.mandatory ? '<span class="warning-badge info">mandatory</span>' : ''}
      </div>`;
    }
    html += '</div>';
  }

  // Dimensions
  html += '<div class="dims-grid">';
  if (dims.time) {
    html += renderDimCard('time', 'Time', dims.time.label,
      `${dims.time.option_count} options`,
      dims.time.granularity ? `<span class="tag">${dims.time.granularity}</span>` : '',
      dims.time.year_range ? `<span class="tag">${dims.time.year_range[0]}–${dims.time.year_range[1]}</span>` : '');
  }
  if (dims.geo) {
    html += renderDimCard('geo', 'Geo', dims.geo.label,
      `${dims.geo.option_count} options`,
      dims.geo.geo_levels ? dims.geo.geo_levels.map(l => `<span class="tag">${l}</span>`).join('') : '');
  }
  if (dims.categories) {
    for (const cat of dims.categories) {
      const tags = [];
      tags.push(`<span class="tag">${cat.cardinality}</span>`);
      if (cat.has_total) tags.push('<span class="tag">has total</span>');
      if (cat.is_caen) tags.push('<span class="tag caen">CAEN</span>');
      if (cat.has_hierarchy) tags.push('<span class="tag hierarchy">hierarchy</span>');
      html += renderDimCard('category', 'Category', cat.label, `${cat.option_count} options`, tags.join(''));
    }
  }
  if (dims.unit) {
    const umTags = dims.unit.multi_unit ? '<span class="tag caen">multi-unit</span>' : '';
    html += renderDimCard('unit', 'Unit', dims.unit.column, `${dims.unit.option_count} options`, umTags);
  }
  if (dims.singleton_dims && dims.singleton_dims.length > 0) {
    for (const s of dims.singleton_dims) {
      html += `<div class="dim-card singleton"><div class="dim-type unit">Singleton (ignored)</div><div class="dim-label">${s}</div></div>`;
    }
  }
  // Special dims
  if (dims.gender) html += renderDimCard('special', 'Gender', dims.gender, '', '');
  if (dims.age) html += renderDimCard('special', 'Age', dims.age, '', '');
  if (dims.residence) html += renderDimCard('special', 'Residence', dims.residence, '', '');
  html += '</div>';

  // Tabs
  const tlAvail = views.timeline && views.timeline.available;
  html += '<div class="tabs">';
  html += `<div class="tab ${tlAvail ? 'active' : 'disabled'}" data-tab="timeline">Timeline${!tlAvail ? ' (N/A)' : ''}</div>`;
  html += `<div class="tab${!tlAvail ? ' active' : ''}" data-tab="snapshot">Snapshot</div>`;
  html += '<div class="tab" data-tab="table">Table</div>';
  html += '</div>';

  html += '<div class="tab-content" id="tabContent">';
  if (tlAvail) {
    html += renderViewTab(views.timeline, 'timeline');
  } else {
    html += renderViewTab(views.snapshot, 'snapshot');
  }
  html += '</div>';

  // Meta
  html += '<div class="meta-row">';
  if (meta.distribution_shape) html += `<div class="meta-item"><span class="meta-label">Distribution:</span><span class="meta-value">${meta.distribution_shape}</span></div>`;
  if (meta.generated_at) html += `<div class="meta-item"><span class="meta-label">Generated:</span><span class="meta-value">${meta.generated_at.split('T')[0]}</span></div>`;
  html += `<div class="meta-item"><span class="meta-label">Version:</span><span class="meta-value">${meta.profile_version || 1}</span></div>`;
  html += '</div>';

  document.getElementById('profileContent').innerHTML = html;

  // Tab switching
  document.querySelectorAll('.tab:not(.disabled)').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.tab;
      const content = document.getElementById('tabContent');
      if (tabName === 'timeline' && views.timeline && views.timeline.available) {
        content.innerHTML = renderViewTab(views.timeline, 'timeline');
      } else if (tabName === 'snapshot') {
        content.innerHTML = renderViewTab(views.snapshot, 'snapshot');
      } else if (tabName === 'table') {
        content.innerHTML = '<div class="table-placeholder">Data table with filters — all dimensions available as filter controls</div>';
      }
    });
  });
}

function renderDimCard(typeClass, typeLabel, label, count, extraTags, extraTags2) {
  return `<div class="dim-card">
    <div class="dim-type ${typeClass}">${typeLabel}</div>
    <div class="dim-label" title="${label}">${label}</div>
    <div class="dim-meta">${count ? `<span class="tag">${count}</span>` : ''}${extraTags || ''}${extraTags2 || ''}</div>
  </div>`;
}

function renderViewTab(view, viewName) {
  if (!view || !view.available) return '<div class="table-placeholder">Not available for this dataset</div>';

  let html = '';

  // Period browser for snapshot
  if (viewName === 'snapshot' && view.year_range) {
    const gran = view.granularity || 'annual';
    const label = gran === 'monthly' ? 'Dec 2024' : gran === 'quarterly' ? 'Q4 2024' : view.year_range[1];
    html += `<div class="period-browser">
      <span class="period-btn">&#9664;</span>
      <span class="period-current">${label}</span>
      <span class="period-btn">&#9654;</span>
      <span class="period-granularity">${gran} · ${view.year_range[0]}–${view.year_range[1]}</span>
    </div>`;
  }

  // Charts
  const charts = view.charts || [];
  if (charts.length === 0) {
    html += '<div class="table-placeholder">No charts configured for this view</div>';
  }
  for (const chart of charts) {
    html += `<div class="chart-card">
      <div class="chart-header">
        <span class="chart-type-badge ${chart.chart_type}">${chart.chart_type.replace(/_/g, ' ')}</span>
        ${chart.is_primary ? '<span class="primary-tag">PRIMARY</span>' : ''}
        ${chart.variant ? `<span class="toggle-tag">variant: ${chart.variant}</span>` : ''}
        ${(chart.toggles || []).map(t => `<span class="toggle-tag">toggle: ${t}</span>`).join('')}
        ${chart.max_series ? `<span class="toggle-tag">max ${chart.max_series} series</span>` : ''}
        ${chart.dimension_pair_toggle ? '<span class="toggle-tag">pair toggle</span>' : ''}
      </div>
      <table class="roles-table">
        ${chart.roles ? Object.entries(chart.roles).map(([role, val]) => {
          const display = Array.isArray(val) ? val.map(shortCol).join(', ') : shortCol(val);
          return `<tr><td class="role-name">${role}</td><td class="role-value">${display || '—'}</td></tr>`;
        }).join('') : ''}
      </table>
    </div>`;
  }

  // Controls
  const controls = view.controls || [];
  if (controls.length > 0) {
    html += '<div class="controls-section"><div class="controls-title">Controls</div>';
    for (const c of controls) {
      html += `<div class="control-item">
        <span class="control-type">${c.type}</span>
        <span class="control-col" title="${c.column}">${c.label || shortCol(c.column)}</span>
        <span class="control-scope">${c.scope}</span>
        <span class="control-default">${c.default || ''}</span>
        ${c.max_selected ? `<span class="toggle-tag">max ${c.max_selected}</span>` : ''}
        ${c.mandatory ? '<span class="warning-badge info">mandatory</span>' : ''}
        ${c.granularity ? `<span class="toggle-tag">${c.granularity}</span>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  return html;
}

function shortCol(col) {
  if (!col) return '—';
  return col.replace(/_nom_id$/, '').replace(/_/g, ' ');
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (hash) {
    const i = index.findIndex(d => d.code === hash);
    if (i >= 0) { currentIdx = i; loadProfile(index[i].code); searchInput.value = hash; }
  }
});

init();
</script>
