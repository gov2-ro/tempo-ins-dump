<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatExplorer — INS TEMPO</title>
    <link rel="stylesheet" href="css/app.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Vue 3 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
    <!-- Fuse.js for fuzzy search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>
<body>
    <div id="app">
        <!--
            Static Site version of StatExplorer.
            - Metadata loaded from pre-built JSON (api/*.json)
            - Data queries run via DuckDB-WASM against parquet files
            - No backend server required
        -->
        <top-nav></top-nav>

        <div class="app-body" v-if="store.currentDataset">
            <filter-bar></filter-bar>
            <div class="main-layout">
                <left-sidebar></left-sidebar>
                <chart-canvas></chart-canvas>
            </div>
        </div>
        <dataset-picker v-else></dataset-picker>

        <footer-bar></footer-bar>

        <!-- DuckDB-WASM loading indicator -->
        <div v-if="store.duckdbLoading" class="duckdb-loading-overlay">
            <div class="duckdb-loading-box">
                <div class="spinner"></div>
                <p>Loading data engine...</p>
                <p class="loading-detail">First query initializes DuckDB-WASM (~10 MB)</p>
            </div>
        </div>
    </div>

    <!--
        Script loading order:
        1. Static API client (replaces server-backed api.js)
        2. DuckDB data client (loaded lazily by api-static.js on first data query)
        3. Chart modules (ported from explorer/)
        4. UI components (ported from explorer/)
        5. App bootstrap
    -->

    <!-- Lib: static API client -->
    <script type="module">
        // Bootstrap: load the static API client as a global,
        // then load the rest of the app.
        import API from './js/api-static.js';
        window.API = API;

        // Initialize config, then signal app.js to boot
        API.init().then(() => {
            window.dispatchEvent(new Event('api-ready'));
        });
    </script>

    <script src="js/lib/utils.js"></script>
    <script src="js/lib/i18n.js"></script>
    <!-- Charts -->
    <script src="js/charts/chart-line.js"></script>
    <script src="js/charts/chart-bar.js"></script>
    <script src="js/charts/chart-geo.js"></script>
    <script src="js/charts/chart-pyramid.js"></script>
    <script src="js/charts/chart-heatmap.js"></script>
    <script src="js/charts/chart-bubble.js"></script>
    <script src="js/charts/chart-small-multiples.js"></script>
    <script src="js/charts/chart-table.js"></script>
    <script src="js/charts/chart-factory.js"></script>
    <!-- Components -->
    <script src="js/components/TopNav.js"></script>
    <script src="js/components/FilterBar.js"></script>
    <script src="js/components/LeftSidebar.js"></script>
    <script src="js/components/ChartCanvas.js"></script>
    <script src="js/components/DatasetPicker.js"></script>
    <script src="js/components/FooterBar.js"></script>
    <!-- App -->
    <script src="js/app.js"></script>
</body>
</html>
